name: Daily arXiv Paper Update

on:
  schedule:
    # Run at 8:00 AM UTC every day
    - cron: "0 8 * * *"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      days:
        description: "Days of papers to fetch"
        required: false
        default: "1"
      categories:
        description: "Comma-separated arXiv categories"
        required: false
        default: "cs.AI,cs.CV,cs.LG,cs.NLP,stat.ML,math.ST"

jobs:
  update-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch first to avoid pulling in CUDA (~4 GB)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r backend/requirements.txt

      - name: Run pipeline
        working-directory: backend
        env:
          DAYS: ${{ github.event.inputs.days || '1' }}
          CATEGORIES: ${{ github.event.inputs.categories || 'cs.AI,cs.CV,cs.LG,cs.NLP,stat.ML,math.ST' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python main.py --days "$DAYS" --categories "$CATEGORIES" --output ../web/data/papers.json

      - name: Check if data changed
        id: check-changes
        run: |
          git diff --quiet web/data/papers.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated papers.json
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/papers.json
          git commit -m "chore: update papers.json [$(date -u '+%Y-%m-%d')]"
          git push

      - name: No changes — skip commit
        if: steps.check-changes.outputs.changed == 'false'
        run: echo "papers.json unchanged, skipping commit."

      - name: Report results
        if: always()
        run: |
          if [ -f web/data/papers.json ]; then
            COUNT=$(python3 -c "import json; d=json.load(open('web/data/papers.json')); print(len(d['papers']))")
            echo "✅ papers.json contains $COUNT papers"
          else
            echo "❌ papers.json not found"
          fi
